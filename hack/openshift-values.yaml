global:
  serviceAccountName: kuberless

operator:
  image:
    repository: ghcr.io/alfredtm/kuberless/operator
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

apiserver:
  image:
    repository: ghcr.io/alfredtm/kuberless/apiserver
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  postgresql:
    existingSecret: kuberless-db
    secretKey: database-url

frontend:
  image:
    repository: ghcr.io/alfredtm/kuberless/frontend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 3000
  apiUrl: "http://kuberless-apiserver:8080"
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

knativeServing:
  enabled: true
  config:
    domain:
      "kuberless.example.com": ""

ingress:
  enabled: false

# Gateway API is used on OpenShift instead of standard Ingress.
# Set gatewayName and gatewayNamespace to match your Envoy Gateway install.
gateway:
  enabled: true
  gatewayName: ""
  gatewayNamespace: envoy-gateway-system
  hostname: kuberless.example.com
  appsDomain: example.com

serviceAccount:
  create: true
  name: kuberless
