---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: apps.kuberless.io
spec:
  group: kuberless.io
  names:
    kind: App
    listKind: AppList
    plural: apps
    singular: app
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.url
      name: URL
      type: string
    - jsonPath: .status.readyInstances
      name: Ready
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: App is the Schema for the apps API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AppSpec defines the desired state of App.
            properties:
              customDomains:
                description: Custom domain hostnames for this app.
                items:
                  description: CustomDomain represents a custom domain mapping.
                  properties:
                    hostname:
                      description: Hostname for the custom domain.
                      type: string
                  required:
                  - hostname
                  type: object
                type: array
              env:
                description: Environment variables for the container.
                items:
                  description: EnvVar represents an environment variable for an app.
                  properties:
                    name:
                      description: Name of the environment variable.
                      type: string
                    secretRef:
                      description: Reference to a secret key.
                      properties:
                        key:
                          description: Key within the Secret.
                          type: string
                        name:
                          description: Name of the Secret.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                    value:
                      description: Literal value.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              image:
                description: Container image to deploy.
                minLength: 1
                type: string
              paused:
                description: Whether the app is paused (scaled to zero and not accepting
                  traffic).
                type: boolean
              port:
                default: 8080
                description: Container port to expose.
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              resources:
                description: Resource requests and limits.
                properties:
                  cpuRequest:
                    default: 100m
                    description: CPU request (e.g. "100m").
                    type: string
                  memoryLimit:
                    default: 512Mi
                    description: Memory limit (e.g. "512Mi").
                    type: string
                type: object
              scaling:
                description: Autoscaling configuration.
                properties:
                  maxInstances:
                    default: 10
                    description: Maximum number of instances.
                    format: int32
                    minimum: 1
                    type: integer
                  minInstances:
                    default: 0
                    description: Minimum number of instances. 0 enables scale-to-zero.
                    format: int32
                    minimum: 0
                    type: integer
                  targetConcurrency:
                    default: 100
                    description: Target concurrent requests per instance.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              tenantRef:
                description: Reference to the parent Tenant (by name, must exist in
                  the same cluster).
                minLength: 1
                type: string
            required:
            - image
            - tenantRef
            type: object
          status:
            description: AppStatus defines the observed state of App.
            properties:
              conditions:
                description: Standard conditions for the app.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              latestRevision:
                description: The name of the latest Knative revision.
                type: string
              phase:
                description: Current lifecycle phase of the app.
                enum:
                - Pending
                - Deploying
                - Ready
                - Failed
                - Paused
                type: string
              readyInstances:
                description: Number of ready instances.
                format: int32
                type: integer
              url:
                description: The auto-generated URL for this app.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
