apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "apiserver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiserver.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "apiserver.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "apiserver.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.global.serviceAccountName }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apiserver
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.port }}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kuberless-jwt
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKey }}
            {{- with .Values.global.auth }}
            {{- if .keycloak }}
            - name: KEYCLOAK_ENABLED
              value: {{ .keycloak.enabled | default false | quote }}
            - name: KEYCLOAK_ISSUER_URL
              value: {{ .keycloak.issuerUrl | default "" | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .keycloak.clientId | default "kuberless" | quote }}
            {{- end }}
            {{- if .adminLogin }}
            - name: ADMIN_LOGIN_ENABLED
              value: {{ .adminLogin.enabled | default true | quote }}
            {{- if .adminLogin.existingSecret }}
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .adminLogin.existingSecret }}
                  key: username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .adminLogin.existingSecret }}
                  key: password
            {{- else }}
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .adminLogin.secretName | default "kuberless-admin" }}
                  key: username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .adminLogin.secretName | default "kuberless-admin" }}
                  key: password
            {{- end }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "apiserver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiserver.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "apiserver.selectorLabels" . | nindent 4 }}
