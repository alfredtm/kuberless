{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kuberless.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kuberless.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
  {{- if .Values.gateway.hostname }}
  hostnames:
    - {{ .Values.gateway.hostname }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ include "kuberless.fullname" . }}-apiserver
          port: {{ .Values.apiserver.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "kuberless.fullname" . }}-frontend
          port: {{ .Values.frontend.port }}
{{- end }}
