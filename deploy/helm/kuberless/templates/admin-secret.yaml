{{- $g := .Values.global | default dict }}
{{- $auth := $g.auth | default dict }}
{{- $al := $auth.adminLogin | default dict }}
{{- $adminEnabled := $al.enabled | default true }}
{{- $existingSecret := $al.existingSecret | default "" }}
{{- if and $adminEnabled (not $existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $al.secretName | default "kuberless-admin" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kuberless.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ $al.username | default "admin" | quote }}
  password: {{ $al.password | default "" | quote }}
{{- end }}
