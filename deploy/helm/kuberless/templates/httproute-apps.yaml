{{- if and .Values.gateway.enabled .Values.gateway.appsDomain }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kuberless.fullname" . }}-apps
  namespace: knative-serving
  labels:
    {{- include "kuberless.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
  hostnames:
    - "*.{{ .Values.gateway.appsDomain }}"
  rules:
    - backendRefs:
        - name: kourier-internal
          port: 80
{{- end }}
