{{- $secretName := "kuberless-jwt" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kuberless.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
{{- if $existing }}
data:
  jwt-secret: {{ index $existing.data "jwt-secret" }}
{{- else }}
stringData:
  jwt-secret: {{ randAlphaNum 32 | quote }}
{{- end }}
